<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Area Admin - Mamma Ho Fame</title>
    <style>
        body { font-family: Arial; background: #222; color: white; padding: 20px; }
        input, textarea, select { display: block; width: 100%; margin: 10px 0; padding: 10px; }
    </style>
</head>
<body>
    <h1>Pannello Titolare</h1>
    
    <input type="text" id="nome" placeholder="Nome">
    <input type="text" id="prezzo" placeholder="Prezzo">
    <textarea id="descrizione" placeholder="Descrizione"></textarea>
    
<select id="product-category">
    <option value="tris-di-polpette">Tris di Polpette</option>
    <option value="taglieri">Taglieri</option>
    <option value="dolci">Dolci</option>
    <option value="panini">Burger</option>
    <option value="piadine">Piadine</option>
    <option value="bao">Bao</option>
    <option value="special">Special</option>
    <option value="friggitoria">Friggitoria</option>
    <option value="beverage">Beverage</option>
</select>
    
    <button onclick="salvaPanino()">Salva Panino</button>

    <hr>
    <h2>Lista Panini Attuali</h2>
    <div id="admin-list"></div>

    <script>
    const passwordCorretta = "MammaHoFame2026";
    const passwordInserita = prompt("Inserisci la password:");
    if (passwordInserita !== passwordCorretta) {
        alert("Password errata!");
        window.location.href = "index.html";
    }

    function caricaLista() {
        let lista = JSON.parse(localStorage.getItem('mieiPanini')) || [];
        const container = document.getElementById('admin-list');
        container.innerHTML = lista.map((item, index) => `
            <div style="border-bottom: 1px solid #555; padding: 10px;">
                <strong>${item.nome}</strong> (${item.categoria}) - ${item.prezzo}
                <button onclick="eliminaPanino(${index})">Elimina</button>
            </div>
        `).join("");
    }

    function salvaPanino() {
        const nuovoPanino = {
            nome: document.getElementById('nome').value,
            prezzo: document.getElementById('prezzo').value,
            descrizione: document.getElementById('descrizione').value,
            categoria: document.getElementById('product-category').value,
        };
        
        let lista = JSON.parse(localStorage.getItem('mieiPanini')) || [];
        lista.push(nuovoPanino);
        localStorage.setItem('mieiPanini', JSON.stringify(lista));
        
        alert("Panino salvato!");
        caricaLista();
    }

    function eliminaPanino(index) {
        let lista = JSON.parse(localStorage.getItem('mieiPanini'));
        lista.splice(index, 1);
        localStorage.setItem('mieiPanini', JSON.stringify(lista));
        caricaLista();
    }

    caricaLista();
    </script>
</body>
</html>
