<!DOCTYPE html>
<html>
<body>
    <h1>Area Admin</h1>
    <input type="password" id="pass" placeholder="Password">
    <div id="admin-ui" style="display:none;">
        <input id="cat" placeholder="Categoria">
        <input id="nome" placeholder="Nome">
        <input id="prezzo" placeholder="Prezzo">
        <button onclick="salva()">Aggiungi Prodotto</button>
    </div>

    <script>
        const pass = "MammaHoFame2026";
        document.getElementById('pass').oninput = (e) => {
            if(e.target.value === pass) document.getElementById('admin-ui').style.display = 'block';
        };

        function salva() {
            let menu = JSON.parse(localStorage.getItem('menu')) || [];
            menu.push({
                cat: document.getElementById('cat').value,
                nome: document.getElementById('nome').value,
                prezzo: document.getElementById('prezzo').value
            });
            localStorage.setItem('menu', JSON.stringify(menu));
            alert("Salvato!");
        }
    </script>
</body>
</html>
