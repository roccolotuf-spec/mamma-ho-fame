<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Mamma Ho Fame - Menu</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: #ff9800; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1100px; margin: 30px auto; }
        .card { background: #262626; padding: 20px; border-radius: 15px; border: 1px solid #ff9800; transition: 0.3s; }
        .card:hover { transform: scale(1.02); }
        h1 { font-size: 2.5em; margin-bottom: 30px; }
        h2 { color: #fff; margin-top: 40px; border-bottom: 2px solid #ff9800; display: inline-block; padding: 0 20px; }
        .prezzo { font-weight: bold; font-size: 1.2em; color: #fff; }
        .desc { font-size: 0.9em; color: #aaa; margin-top: 5px; }
        button { padding: 15px 40px; background: #ff9800; border: none; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; font-size: 1.2em; }
    </style>
</head>
<body>
    <h1>MAMMA HO FAME</h1>
    <div id="menu-container"></div>
    <div style="margin: 60px 0;">
        <h2>Tenta la Fortuna</h2>
        <button id="btn-play">Gira la ruota!</button>
        <p id="result-message" style="font-size: 1.5em; margin-top: 20px;"></p>
    </div>

    <script>
        const menu = [
            { cat: "Tris di Polpette", nome: "POLPETTE CLASSICHE", prezzo: "€ 5,00", desc: "Vitello, maiale, melanzane e pollo." },
            { cat: "Taglieri", nome: "TAGLIERE PICCOLO", prezzo: "€ 15,00", desc: "Salumi e formaggi." },
            { cat: "Taglieri", nome: "TAGLIERE MEDIO", prezzo: "€ 22,00", desc: "Salumi e formaggi." },
            { cat: "Taglieri", nome: "TAGLIERE GRANDE", prezzo: "€ 28,00", desc: "Salumi, formaggi e fritti." },
            { cat: "Burger", nome: "MAMMA ROSA", prezzo: "€ 6,00", desc: "Hamburger 200g, cheddar, insalata, pomodoro." },
            { cat: "Burger", nome: "MAMMA ANGELA", prezzo: "€ 8,00", desc: "Pollo impanato, stracciatella, salsa cesar, bacon." },
            { cat: "Burger", nome: "TARANTARSIA", prezzo: "€ 7,00", desc: "Salsiccia, friggitelli, caciocavallo, cipolla, maio pepe nero." },
            { cat: "Burger", nome: "BIG CALABRIA", prezzo: "€ 13,00", desc: "Scottona 200g, salsiccia 200g, caciocavallo, cheddar, bacon." },
            { cat: "Special", nome: "CALABROSMASH", prezzo: "€ 9,00", desc: "Smash, caciocavallo, bacon, cipolla, maio all'nduja." },
            { cat: "Special", nome: "PANINI CINESI", prezzo: "€ 2,50", desc: "3 pezzi con salsa a scelta (latte condensato, nutella o pistacchio)." },
            { cat: "Bao", nome: "BAO 101", prezzo: "€ 4,00", desc: "Pollo nel panko, insalata, salsa chili." },
            { cat: "Bao", nome: "BAO 102", prezzo: "€ 4,00", desc: "Pulled pork, caciocavallo, crema di pistacchio." },
            { cat: "Friggitoria", nome: "DIPPERS (Cheddar e Bacon)", prezzo: "€ 4,00", desc: "Patatine con buccia." },
            { cat: "Dolci", nome: "BUBBLE WAFFLE", prezzo: "€ 4,00", desc: "Gelato, due gusti a scelta e granella." }
        ];

        const categorie = ["Tris di Polpette", "Taglieri", "Burger", "Special", "Bao", "Friggitoria", "Dolci"];
        const container = document.getElementById('menu-container');

        categorie.forEach(c => {
            container.innerHTML += `<h2>${c}</h2><div class="grid" id="${c}"></div>`;
            const items = menu.filter(i => i.cat === c);
            items.forEach(i => {
                document.getElementById(c).innerHTML += `<div class="card"><h3>${i.nome}</h3><p class="prezzo">${i.prezzo}</p><p class="desc">${i.desc}</p></div>`;
            });
        });

        document.getElementById('btn-play').onclick = () => {
            const vinti = ["🎉 10% di sconto!", "🎉 Bibita omaggio!", "🎉 Caffè offerto!"];
            document.getElementById('result-message').innerText = Math.random() > 0.5 ? vinti[Math.floor(Math.random()*vinti.length)] : "Ritenta la fortuna!";
        };
    </script>
</body>
</html>
