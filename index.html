<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Mamma Ho Fame</title>
    </head>
<body>

    <header class="hero">
        <div class="hero-text">
            <h1>Mamma Ho Fame</h1>
            <p>Il gusto che ti insegue!</p>
        </div>
        <img src="https://i.ibb.co/93grnZQr/d0a27311-1c75-4bb7-aa32-226df3a340c6.jpg" class="hero-image">
    </header>

<div id="panini-list"></div>

<script>
    function caricaEVisualizza() {
        const container = document.getElementById('panini-list');
        
        // Recupera dal database locale
        const datiSalvati = localStorage.getItem('mieiPanini');
        
        // Controllo di sicurezza
        if (!datiSalvati) {
            container.innerHTML = "<p>Nessun panino aggiunto.</p>";
            return;
        }

        try {
            const lista = JSON.parse(datiSalvati);
            container.innerHTML = lista.map(item => `
                <div class="card" style="margin-bottom: 20px; border: 1px solid #ccc; padding: 10px;">
                    <h3>${item.nome || "Senza Nome"}</h3>
                    <p>Prezzo: ${item.prezzo || "0"} €</p>
                    <p>Descrizione: ${item.descrizione || "Nessuna descrizione"}</p>
                </div>
            `).join("");
        } catch (e) {
            console.error("Errore nel leggere i dati:", e);
            container.innerHTML = "<p>Errore nel caricamento del menù.</p>";
        }
    }

    // Forza il caricamento al momento giusto
    window.onload = caricaEVisualizza;
</script>

    <div id="game-section">
        <h2>Tenta la Fortuna</h2>
        <button id="btn-play">Gira la ruota!</button>
        <p id="result-message"></p>
    </div>

    <footer class="footer">
        <p>La mascotte di Mamma Ho Fame: 🐾 Pongo!</p>
    </footer>

    <script>
        function renderMenu() {
            const container = document.getElementById('panini-list');
            const savedMenu = JSON.parse(localStorage.getItem('mieiPanini')) || [];
            
            if (savedMenu.length === 0) {
                container.innerHTML = "<p>Menù in aggiornamento, torna presto!</p>";
                return;
            }
            
            container.innerHTML = savedMenu.map(item => `
                <div class="card">
                    <h3>${item.nome || "Panino"}</h3>
                    <p class="price">${item.prezzo || "0"} €</p>
                    <p class="descrizione">${item.descrizione || ""}</p>
                </div>
            `).join("");
        }

        // Lancia la funzione
        renderMenu();
    </script>
</body>
</html>
