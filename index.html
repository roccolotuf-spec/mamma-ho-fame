<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Mamma Ho Fame</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: #ff9800; text-align: center; padding: 20px; }
        .menu-section { margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; }
        .card { background: #262626; padding: 20px; border-radius: 15px; border: 1px solid #ff9800; }
        h1 { font-size: 3em; margin-bottom: 20px; }
        h2 { border-bottom: 2px solid #ff9800; display: inline-block; padding: 0 20px; }
        button { padding: 15px 30px; background: #ff9800; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 1.2em; }
    </style>
</head>
<body>
    <h1>MAMMA HO FAME</h1>
    <div id="menu"></div>
    <div style="margin-top: 50px;">
        <h2>Tenta la Fortuna</h2>
        <button id="btn-play">Gira la ruota!</button>
        <p id="result-message" style="font-size: 1.5em;"></p>
    </div>

    <script>
        const menu = [
            { cat: "Panini", nome: "MAMMA ROSA", prezzo: "€ 6,00", desc: "Hamburger 200g, cheddar, insalata." },
            { cat: "Friggitoria", nome: "ALETTE DI POLLO", prezzo: "€ 2,00", desc: "Patatine con buccia." },
            { cat: "Dolci", nome: "YOGURT YOGURT", prezzo: "€ 1,00", desc: "Pratine di yogurt." }
        ];

        const categorie = ["Panini", "Friggitoria", "Dolci"];
        const menuDiv = document.getElementById('menu');

        categorie.forEach(c => {
            menuDiv.innerHTML += `<div class="menu-section"><h2>${c}</h2><div class="grid" id="${c}"></div></div>`;
            const items = menu.filter(i => i.cat === c);
            const grid = document.getElementById(c);
            items.forEach(i => {
                grid.innerHTML += `<div class="card"><h3>${i.nome}</h3><p>${i.prezzo}</p><p>${i.desc}</p></div>`;
            });
        });

        document.getElementById('btn-play').onclick = () => {
            document.getElementById('result-message').innerText = Math.random() < 0.5 ? "🎉 VINTO!" : "RITENTA!";
        };
    </script>
</body>
</html>
