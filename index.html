<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Mamma Ho Fame</title>
    <style>
        body { background-color: #1a1a1a; color: #ff9800; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        h1 { font-size: 2em; margin-bottom: 30px; }
        h2 { color: #fff; margin: 40px 0 20px 0; border-bottom: 2px solid #ff9800; display: inline-block; padding: 0 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; max-width: 1000px; margin: 0 auto; }
        .card { background: #262626; padding: 15px; border-radius: 10px; border: 1px solid #444; }
        .nome { color: #fff; font-weight: bold; font-size: 1.1em; }
        .prezzo { color: #ff9800; margin: 5px 0; font-weight: bold; }
        .desc { font-size: 0.85em; color: #aaa; }
        button { background: #ff9800; color: #fff; border: none; padding: 15px 30px; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 50px; }
    </style>
</head>
<body>

    <h1>MAMMA HO FAME</h1>
    <div id="menu-container"></div>
    <button id="btn-play">Gira la ruota!</button>
    <p id="result" style="margin-top:20px;"></p>

    <script>
        const menu = [
            { cat: "Tris di Polpette", nome: "POLPETTE CLASSICHE", prezzo: "€ 5,00", desc: "Vitello, maiale, melanzane e pollo" },
            { cat: "Taglieri", nome: "TAGLIERE PICCOLO", prezzo: "€ 15,00", desc: "Salumi e formaggio" },
            { cat: "Taglieri", nome: "TAGLIERE MEDIO", prezzo: "€ 22,00", desc: "Salumi e formaggio" },
            { cat: "Taglieri", nome: "TAGLIERE GRANDE", prezzo: "€ 28,00", desc: "Salumi, formaggio e fritti" },
            { cat: "Burger", nome: "MAMMA ROSA", prezzo: "€ 6,00", desc: "Hamburger 200g, cheddar, insalata, pomodoro" },
            { cat: "Burger", nome: "MAMMA ANGELA", prezzo: "€ 8,00", desc: "Pollo impanato, stracciatella, salsa cesar, bacon" },
            { cat: "Burger", nome: "TARANTARSIA", prezzo: "€ 7,00", desc: "Salsiccia, friggitelli, caciocavallo, cipolla, maio pepe nero" },
            { cat: "Special", nome: "CALABROSMASH", prezzo: "€ 9,00", desc: "Smash, caciocavallo, bacon, cipolla caramellata, maio all'nduja" },
            { cat: "Special", nome: "PANINI CINESI", prezzo: "€ 2,50", desc: "3 pezzi con salsa a scelta (latte cond., Nutella, pistacchio)" },
            { cat: "Bao", nome: "BAO 101", prezzo: "€ 4,00", desc: "Pollo panato nel panko, insalata, salsa chili" },
            { cat: "Bao", nome: "BAO 102", prezzo: "€ 4,00", desc: "Pulled pork, caciocavallo, crema di pistacchio" },
            { cat: "Friggitoria", nome: "DIPPERS", prezzo: "€ 4,00", desc: "Patatine con buccia" },
            { cat: "Dolci", nome: "BUBBLE WAFFLE", prezzo: "€ 4,00", desc: "Gelato e granella a scelta" }
        ];

        const categorie = ["Tris di Polpette", "Taglieri", "Burger", "Special", "Bao", "Friggitoria", "Dolci"];
        const container = document.getElementById('menu-container');

        categorie.forEach(c => {
            container.innerHTML += `<h2>${c}</h2><div class="grid" id="${c.replace(/ /g, '_')}"></div>`;
            menu.filter(i => i.cat === c).forEach(i => {
                document.getElementById(c.replace(/ /g, '_')).innerHTML += `
                    <div class="card">
                        <div class="nome">${i.nome}</div>
                        <div class="prezzo">${i.prezzo}</div>
                        <div class="desc">${i.desc}</div>
                    </div>`;
            });
        });

        document.getElementById('btn-play').onclick = () => alert("La ruota gira...");
    </script>
</body>
</html>
