<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">

<body>
    <header style="text-align: center; padding: 40px 0;">
    <img src="pongo.png" alt="Pongo" style="width: 120px; margin-bottom: 10px;"> <h1 style="font-family: sans-serif; font-size: 2.5rem; color: #ff9800; margin: 0; text-transform: uppercase; letter-spacing: 2px;">
        Mamma ho fame
    </h1>
</header>

    <header class="hero">
        <div class="hero-text">
            
        </div>
        <img src="https://i.ibb.co/93grnZQr/d0a27311-1c75-4bb7-aa32-226df3a340c6.jpg" class="hero-image">
    </header>
<!-- 1. Tris di Polpette -->
<h2>Tris di Polpette</h2>
<div id="tris-di-polpette-list" class="menu-cat"></div>

<!-- 2. Taglieri -->
<h2>Taglieri</h2>
<div id="taglieri-list" class="menu-cat"></div>

<!-- 3. Dolci -->
<h2>Dolci</h2>
<div id="dolci-list" class="menu-cat"></div>

<!-- 4. Burger (Ex Panini) -->
<h2>Burger</h2>
<div id="panini-list" class="menu-cat"></div>

<!-- 5. Piadine -->
<h2>Piadine</h2>
<div id="piadine-list" class="menu-cat"></div>

<!-- 6. Bao -->
<h2>Bao</h2>
<div id="bao-list" class="menu-cat"></div>

<!-- 7. Special -->
<h2>Special</h2>
<div id="special-list" class="menu-cat"></div>

<!-- 8. Friggitoria -->
<h2>Friggitoria</h2>
<div id="friggitoria-list" class="menu-cat"></div>

<!-- 9. Beverage -->
<h2>Beverage</h2>
<div id="beverage-list" class="menu-cat"></div>
   

    <div id="game-section">
        <h2>Tenta la Fortuna</h2>
        <button id="btn-play">Gira la ruota!</button>
        <p id="result-message"></p>
    </div>

    <footer class="footer">
        
    </footer>

    <script>
        function renderMenu() {
            // Recupero dati
            const listaCompleta = JSON.parse(localStorage.getItem('mieiPanini')) || [];

            // Funzione motore per dividere i dati
            function stampaCategoria(cat, idContenitore) {
                const container = document.getElementById(idContenitore);
                if (!container) return; 

                const filtrati = listaCompleta.filter(item => item.categoria === cat);
                
                container.innerHTML = filtrati.length > 0 
                    ? filtrati.map(item => `
                        <div class="card">
                            <h3>${item.nome}</h3>
                            <p class="price">${item.prezzo} €</p>
                            <p>${item.descrizione || ""}</p>
                        </div>
                    `).join("")
                    : "<p>Nessun articolo in questa categoria.</p>";
            }

            // Smistamento su tutti i div creati sopra
           // Smistamento su tutti i div creati sopra
// I valori tra le prime virgolette DEVONO coincidere con i 'value' del tuo select Admin
stampaCategoria('panini', 'panini-list');
stampaCategoria('dolci', 'dolci-list');
stampaCategoria('taglieri', 'taglieri-list');
stampaCategoria('tris-di-polpette', 'tris-di-polpette-list');
stampaCategoria('bao', 'bao-list');
stampaCategoria('piadine', 'piadine-list');
stampaCategoria('special', 'special-list');
stampaCategoria('friggitoria', 'friggitoria-list');
stampaCategoria('beverage', 'beverage-list');
        }

        // Avvio unico
        renderMenu();
    </script>
    <section id="gioco" style="text-align: center; padding: 40px;">
    <h2 style="color: #ff9800;">Tenta la Fortuna</h2>
    <button onclick="giraRuota()" style="padding: 10px 20px; background-color: #ff9800; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
        Gira la ruota!
    </button>
    <p id="risultato" style="margin-top: 15px;"></p>
</section>
</body>
</html>
