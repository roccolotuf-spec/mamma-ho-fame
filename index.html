<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Mamma Ho Fame</title>
    <style>
        /* Qui dentro mettiamo tutto il tuo CSS */
        body { font-family: sans-serif; text-align: center; }
        .menu-cat { margin-bottom: 20px; }
        .card { border: 1px solid #ccc; padding: 10px; margin: 5px; }
    </style>
</head>
<body>
    <header>
        <h1 style="color: #ff9800;">MAMMA HO FAME</h1>
    </header>

    <main id="menu-container">
        <h2>Burger</h2><div id="panini-list" class="menu-cat"></div>
    </main>

    <div id="sezione-gioco">
        <button id="btn-play">Gira la ruota!</button>
        <p id="result-message"></p>
    </div>

    <script>
        // Qui dentro mettiamo tutto il tuo JS
        const menuPredefinito = [
            { categoria: "Burger", nome: "MAMMA ROSA", prezzo: "€ 6,00", descrizione: "Hamburger 200g" }
        ];

        function render() {
            const container = document.getElementById('panini-list');
            container.innerHTML = menuPredefinito.map(i => `<div class="card"><h3>${i.nome}</h3></div>`).join("");
        }

        document.getElementById('btn-play').addEventListener('click', () => {
            document.getElementById('result-message').innerText = "Test riuscito!";
        });

        render();
    </script>
</body>
</html>
