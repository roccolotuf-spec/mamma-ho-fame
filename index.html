<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Mamma Ho Fame</title>
    <style>
        body { background: #1a1a1a; color: #ff9800; font-family: sans-serif; text-align: center; padding: 20px; }
        h1 { color: #fff; margin-bottom: 20px; }
        h2 { color: #ff9800; border-bottom: 1px solid #ff9800; display: inline-block; margin-top: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; max-width: 900px; margin: 20px auto; }
        .card { background: #262626; padding: 15px; border-radius: 10px; border: 1px solid #444; }
    </style>
</head>
<body>
    <h1>MAMMA HO FAME</h1>
    <div id="menu-container"></div>

    <script>
        const menu = [
            { cat: "Tris di Polpette", nome: "Polpette Classiche", prezzo: "€5,00", desc: "Vitello, maiale, melanzane e pollo" },
            { cat: "Burger", nome: "MAMMA ROSA", prezzo: "€6,00", desc: "Hamburger 200g, cheddar, insalata" },
            { cat: "Burger", nome: "SMASH BURGER", prezzo: "€8,00", desc: "Doppio hamburger 100g, bacon" },
            { cat: "Friggitoria", nome: "DIPPERS", prezzo: "€4,00", desc: "Patatine con buccia" }
        ];

        const container = document.getElementById('menu-container');
        const cats = [...new Set(menu.map(i => i.cat))];
        cats.forEach(c => {
            container.innerHTML += `<h2>${c}</h2><div class="grid" id="${c}"></div>`;
            menu.filter(i => i.cat === c).forEach(i => {
                document.getElementById(c).innerHTML += `<div class="card"><h3>${i.nome}</h3><p>${i.prezzo}</p><p>${i.desc}</p></div>`;
            });
        });
    </script>
</body>
</html>
