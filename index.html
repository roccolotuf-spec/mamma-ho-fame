<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Mamma Ho Fame</title>
    <style>
        body { background-color: #1a1a1a; color: #ff9800; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .logo-container { margin: 20px 0; }
        .logo-container img { width: 40px; }
        h1 { font-size: 2em; margin-bottom: 40px; }
        h2 { color: #fff; margin: 30px 0; }
        
        /* Layout Griglia */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1100px; margin: 0 auto 40px; }
        .card { background: #262626; padding: 15px; border-radius: 10px; border: 1px solid #444; }
        
        /* Card Speciale (tipo hamburger) */
        .hero-card { background: #262626; border: 1px solid #444; padding: 20px; border-radius: 10px; max-width: 400px; margin: 20px auto; }
        .hero-card img { width: 150px; }
        
        button { background: #ff9800; color: #fff; border: none; padding: 10px 30px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/roccolotuf-spec/mamma-ho-fame/main/pongo.png" alt="Logo">
        <div>MAMMA HO FAME</div>
    </div>

    <!-- Sezione Panini (Hero) -->
    <h2>Panini</h2>
    <div class="hero-card">
        <img src="https://img.icons8.com/color/150/hamburger.png" alt="Burger">
        <h3>MAMMA ROSA</h3>
        <p>Hamburger 200g, cheddar, insalata</p>
    </div>

    <div class="grid" id="panini-grid"></div>

    <h2>Friggitoria</h2>
    <div class="grid" id="friggitoria-grid"></div>

    <h2>Dolci</h2>
    <div class="grid" id="dolci-grid"></div>

    <h2>Tenta la Fortuna</h2>
    <button id="btn-play">Gira la ruota!</button>
    <p id="result"></p>

    <script>
        const menu = [
            { cat: "friggitoria-grid", nome: "ALETTE DI POLLO", prezzo: "€2,00", desc: "Patatine con buccia" },
            { cat: "friggitoria-grid", nome: "BOX FRITTO", prezzo: "€2,00", desc: "Patatine con buccia" },
            { cat: "friggitoria-grid", nome: "BANDIDOS", prezzo: "€2,00", desc: "Patatine con buccia" },
            { cat: "friggitoria-grid", nome: "RUSTICI MIGNON", prezzo: "€2,00", desc: "Patatine con buccia" },
            { cat: "dolci-grid", nome: "YOGURT YOGURT", prezzo: "€1,00", desc: "Pratine di yogurt" },
            { cat: "dolci-grid", nome: "YOGURT YOGURT", prezzo: "€1,00", desc: "Pratine di yogurt" },
            { cat: "dolci-grid", nome: "CRÊPES/PANCAKE", prezzo: "€1,00", desc: "Waffle cerata" },
            { cat: "dolci-grid", nome: "CRÊPES/PANCAKE", prezzo: "€1,00", desc: "Waffle e nreara" }
        ];

        menu.forEach(item => {
            document.getElementById(item.cat).innerHTML += `
                <div class="card">
                    <div style="color: #fff; font-weight: bold;">${item.nome}</div>
                    <div style="margin: 5px 0;">${item.prezzo}</div>
                    <div style="font-size: 0.8em; color: #888;">${item.desc}</div>
                </div>`;
        });

        document.getElementById('btn-play').onclick = () => alert("Ruota girata!");
    </script>
</body>
</html>
